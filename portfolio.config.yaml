# ╔══════════════════════════════════════════════════════════════════════╗
# ║              GitVitae — Portfolio Configuration                      ║
# ║  This is the only file you need to edit.                             ║
# ║  Run  pnpm check-config  to catch mistakes before deploying.         ║
# ╚══════════════════════════════════════════════════════════════════════╝

# ╔══════════════════════════════════════════════════════════════════════╗
# ║  ** FIRST THING TO CHANGE **                                         ║
# ║                                                                      ║
# ║  siteMode: "landing"  → shows the GitVitae intro page (default)      ║
# ║  siteMode: "portfolio" → shows YOUR portfolio                        ║
# ║                                                                      ║
# ║  Change it to "portfolio" once you have filled in your details.      ║
# ╚══════════════════════════════════════════════════════════════════════╝
siteMode: "portfolio"   # ← CHANGE THIS to "portfolio"
siteUrl:  "https://sazhak.github.io"  # ← Your GitHub Pages URL (used for RSS & canonical links)
showPoweredBy: false  # Set to true to show a small "Made with GitVitae" badge in your footer (helps others discover GitVitae)

# ── Identity ───────────────────────────────────────────── (required) ──
name: "Alexander Kolomiets"              # Your name — shown in the header and used as a fallback in the avatar
title: "Java/Kotlin Software Engineer"
tagline: "I build systems that scale — from MVP to 1000+ TPS"
email: "kaa5843771@yandex.ru"
phone: ""                    # Optional — e.g. "+1 (555) 000-1234". Shown in contact section and resume.
location: "Saint Petersburg, Russia"
avatarUrl: "https://raw.githubusercontent.com/sazhak/sazhak/main/public/avatar.jpg"  # Demo avatar — replace with your own photo URL (see instructions below)
# How to add a profile photo (free, no extra account needed):
#   1. Go to your GitHub repo → click "Add file" → "Upload files"
#   2. Upload your photo (e.g. avatar.jpg) into a folder called "public/"
#   3. After committing, open the file on GitHub and copy the raw URL:
#      https://raw.githubusercontent.com/YOU/your-repo/main/public/avatar.jpg
#   4. Paste that URL here.
# Leave empty to show your initials as a styled placeholder.

# ── Resume download ────────────────────────────────────────────────────
# Optional: link directly to a hosted PDF (Google Drive, Dropbox, etc.)
# If left blank the navbar "Resume" button opens the built-in resume page
# where visitors can use "Save PDF" to print their own copy.
#
# How to get a direct download link:
#   1. Visit /resume in your portfolio, click "Save PDF" -> save the file
#   2. Upload that PDF to Google Drive / Dropbox and copy the direct link
#   3. Paste the link below and update resumeFileName accordingly
#
# resumeUrl: "https://drive.google.com/uc?export=download&id=YOUR_FILE_ID"
# resumeFileName: "Git_Vitae_Resume.pdf"

# ── Status ─────────────────────────────────────────────────────────────
openToWork: true         # Shows "Open to Opportunities" banner when true

# ── Theme ──────────────────────────────────────────────────────────────
defaultTheme: "dark"   # Options: light | dark | system
colorPreset: "slate"    # Options: indigo | emerald | rose | amber | ocean | slate | custom
# primaryColor: "#6366f1" # Optional — pick any colour you like and paste its hex code here.
                           # Overrides colorPreset above. To find a hex code:
                           #   → Google "colour picker", pick a colour, copy the 6-digit code (e.g. #e11d48)
                           #   → or grab one from coolors.co / your favourite site's colour

resumeTheme:
  twoColumn: "stale"    # Accent color for the two-column resume layout
  classic: "stale"     # Accent color for the classic resume layout

contactFormEndpoint: ""  # Optional — paste a Formspree URL (https://formspree.io/f/xxxx)
                           # or any POST endpoint that accepts {name, email, message}.
                           # Leave empty to use a pre-filled mailto: link instead.

# ── Section visibility ─────────────────────────────────────────────────
# Set show: false to hide any section from your portfolio
sections:
  - { id: about,          show: true  }
  - { id: stats,          show: false }  # Stats already appear as cards in the About section above — enable this only if you want a dedicated full-width stats section
  - { id: skills,         show: true  }
  - { id: languages,      show: false  }
  - { id: experience,     show: true  }
  - { id: projects,       show: false  }
  - { id: education,      show: true  }
  - { id: certifications, show: true  }
  - { id: publications,   show: false }
  - { id: testimonials,   show: false  }
  - { id: contact,        show: true  }

