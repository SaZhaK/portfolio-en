# ── Experience ─────────────────────────────────────────────────────────
experience:
  - company: "Solanteq"
    role: "Java/Kotlin Sotfware Engineer"
    period: "2021 – Present"
    description: |
      Built a high‑load testing system for electronic payments, serving top‑10 Russian banks, using Java 17 and Kotlin. Designed SOA architecture, developed protocol services (gRPC, SOAP, TCP) and integration buses. Worked with PostgreSQL and Oracle via Hibernate — optimized queries, resolved N+1 issues, tuned performance.
      Acted as Team Lead for a team of 10 (up to 2 months per year): ran daily stand‑ups, planning sessions, roadmap planning, architectural reviews, and onboarding of newcomers. Organized internal tech lectures on critical modules, reducing bus factor from 2 to 5 developers. Mentored 3 interns, 2 of whom later joined the core team.
      Built a turnkey Fast Payments System emulator handling 1000+ TPS — deployed in 3 top‑10 banks. Designed a distributed audit module with guaranteed event delivery over Kafka. Developed an S3 abstraction layer (Amazon S3, Ceph S3) adopted by 8 product teams. Initiated and built a full‑text search service over 700+ GitLab repos using Lucene — now used by 150+ employees
    highlights:
      - FinTech
      - Java
      - Kotlin
      - Spring Boot
      - PostgreSQL
      - Kafka
      - gRPC
      - Team Leadership
      - System Design (SOA/DDD)
      - S3
      - Lucene

  - company: "CapyPrint (Startup)"
    role: "Co-founder & CTO / Technical Lead"
    period: "2025-02 – 2025-10"
    description: |
      Co‑founder of a B2B printing startup. Single‑handedly built the entire full‑stack system: Java/Kotlin backend, Angular frontend, Python software for Raspberry Pi terminals, integration with Telegram Bot API and ЮKassa payment gateway. Connected edge devices to the cloud via MQTT.
      Built and led a cross‑functional team of 4 developers from scratch, establishing all processes and workflows. Delivered a working MVP in just 2 months, secured a 1M RUB government grant, and closed 2 pilot agreements with real customers. Set up CI/CD with GitHub Actions, ensuring predictable and fast release cycles.
    highlights:
      - Startup
      - IoT (Raspberry Pi / Python)
      - Full‑Stack (Java + Angular)
      - Team Building
      - MVP in 2 months
      - Government Grant
      - MQTT
      - Telegram Bot API 
      - Payment Integration (ЮKassa)

  - company: "Lanit-Tercom"
    role: "Java Developer"
    period: "2021-02 – 2021-06"
    description: |
      Backend developer for an EdTech platform (course delivery and interview prep). Worked with Java 11, Spring Boot, and MySQL (Hibernate). Designed the database schema and service architecture (layered) from scratch, documented REST APIs via Swagger, and integrated with the frontend without friction.
      Achieved 50%+ unit test coverage, significantly reducing regression bugs. Built and published a Java IO/NIO wrapper library to the corporate Maven repo — adopted by 2 other teams, simplifying file operations across projects and lowering the entry barrier for new developers.
    highlights:
      - EdTech
      - Java
      - Spring Boot 
      - REST API / Swagger
      - MySQL / Hibernate 
      - Unit Testing (50%+ coverage) 
      - Library Development (IO/NIO)
      - Layered Architecture

  - company: "Vigo Lab"
    role: "Java Developer (Intern)"
    period: "2020-07 – 2020-08"
    description: |
      First internship — worked on a data transmission quality analytics system for a telecom operator. Developed new features, fixed bugs, and wrote unit tests in Java 8.
      Built an adapter to bridge legacy modules with the modern system, keeping old code running without rewriting. Designed a JSON‑to‑MessagePack converter, cutting data transfer volume by 10%. Wrote database migration scripts, fully automating the transition to a new storage schema and eliminating manual operations in production.
    highlights:
